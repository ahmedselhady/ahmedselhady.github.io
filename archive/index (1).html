<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Name — PhD Researcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;600&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       CONFIGURATION — Edit this section to customize your site
       ============================================================ */
    :root {
      /* Identity */
      --name:              "Your Name";

      /* Colors */
      --bg:                #f5f0e8;
      --bg-secondary:      #ede8de;
      --ink:               #1a1510;
      --ink-muted:         #5c5549;
      --ink-faint:         #a09890;
      --accent:            #b84c1e;       /* rust-orange accent */
      --accent-light:      #f0ddd4;
      --border:            #cfc9be;

      /* Typography scale */
      --font-display:      'Playfair Display', Georgia, serif;
      --font-body:         'Source Serif 4', Georgia, serif;
      --font-mono:         'JetBrains Mono', monospace;
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.7;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    img { max-width: 100%; display: block; }

    /* ============================================================
       LAYOUT
       ============================================================ */
    .site-wrapper {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    header {
      padding: 3.5rem 0 2rem;
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .header-identity {}

    .header-name {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--ink);
    }

    .header-role {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    .header-role span {
      color: var(--accent);
    }

    .header-links {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .header-links a {
      font-family: var(--font-mono);
      font-size: 0.76rem;
      letter-spacing: 0.05em;
      color: var(--ink-muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.2s;
    }

    .header-links a:hover { color: var(--accent); text-decoration: none; }

    .header-links svg {
      width: 14px; height: 14px;
      fill: currentColor;
    }

    /* ============================================================
       NAV TABS
       ============================================================ */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      display: flex;
      gap: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 1.1rem 1.6rem 0.9rem;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab-btn:hover { color: var(--ink); }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ============================================================
       TAB PANELS
       ============================================================ */
    .tab-panel { display: none; padding: 3.5rem 0 5rem; }
    .tab-panel.active { display: block; }

    /* ============================================================
       HOME TAB
       ============================================================ */
    .home-grid {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 3rem;
      align-items: start;
    }

    @media (max-width: 640px) {
      .home-grid { grid-template-columns: 1fr; }
      .home-photo { order: -1; }
    }

    .home-intro p {
      font-size: 1.12rem;
      line-height: 1.75;
      color: var(--ink);
      margin-bottom: 1.2rem;
      font-weight: 300;
    }

    .home-intro p:first-child {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-style: italic;
      font-weight: 400;
    }

    .home-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1.8rem;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      padding: 0.25rem 0.75rem;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 2px;
    }

    .home-photo {
      position: relative;
    }

    .home-photo img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      filter: sepia(8%) contrast(1.05);
    }

    .home-photo::after {
      content: '';
      position: absolute;
      inset: 8px -8px -8px 8px;
      border: 1px solid var(--border);
      z-index: -1;
    }

    .home-news {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 1.2rem;
    }

    .news-list { list-style: none; }

    .news-item {
      display: flex;
      gap: 1.5rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--bg-secondary);
      align-items: baseline;
    }

    .news-date {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--ink-faint);
      white-space: nowrap;
      min-width: 5.5rem;
    }

    .news-text {
      font-size: 0.95rem;
      color: var(--ink-muted);
    }

    .news-text strong { color: var(--ink); font-weight: 400; }

    /* ============================================================
       PUBLICATIONS TAB
       ============================================================ */
    .pub-filter {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      padding: 0.3rem 0.9rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      color: var(--ink-muted);
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    .pub-year-group { margin-bottom: 3rem; }

    .pub-year {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--bg-secondary);
      -webkit-text-stroke: 1px var(--border);
      margin-bottom: 1rem;
      line-height: 1;
    }

    .pub-card {
      padding: 1.4rem 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .pub-title {
      font-family: var(--font-display);
      font-size: 1.08rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--ink);
      margin-bottom: 0.35rem;
    }

    .pub-authors {
      font-size: 0.88rem;
      color: var(--ink-muted);
      margin-bottom: 0.25rem;
    }

    .pub-authors .you { color: var(--ink); font-style: italic; }

    .pub-venue {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.03em;
      margin-bottom: 0.6rem;
    }

    .pub-abstract {
      font-size: 0.9rem;
      color: var(--ink-muted);
      line-height: 1.6;
      margin-bottom: 0.8rem;
      display: none;
    }

    .pub-card.expanded .pub-abstract { display: block; }

    .pub-actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .pub-btn {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      padding: 0.2rem 0.7rem;
      border: 1px solid var(--border);
      background: none;
      color: var(--ink-muted);
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-block;
    }

    .pub-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      text-decoration: none;
    }

    /* ============================================================
       BLOG TAB
       ============================================================ */
    .blog-grid {
      display: grid;
      gap: 0;
    }

    .blog-card {
      display: grid;
      grid-template-columns: 5.5rem 1fr;
      gap: 1.5rem;
      padding: 1.8rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.15s;
      align-items: start;
    }

    .blog-card:hover { opacity: 0.75; }

    .blog-date-col {
      text-align: right;
      padding-top: 0.25rem;
    }

    .blog-date-day {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1;
      color: var(--ink-faint);
    }

    .blog-date-month {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .blog-type {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .blog-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }

    .blog-summary {
      font-size: 0.9rem;
      color: var(--ink-muted);
      line-height: 1.6;
    }

    .blog-tags {
      margin-top: 0.6rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    /* Article full view */
    .article-view { display: none; }
    .article-view.active { display: block; }
    .blog-list-view.hidden { display: none; }

    .back-btn {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: var(--ink-muted);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 2rem;
      padding: 0;
      transition: color 0.15s;
    }

    .back-btn:hover { color: var(--accent); }

    .article-header {
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .article-type {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .article-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 0.8rem;
    }

    .article-meta {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
    }

    .article-body {
      font-size: 1rem;
      line-height: 1.85;
      color: var(--ink);
      max-width: 680px;
    }

    .article-body p { margin-bottom: 1.4rem; }
    .article-body h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      margin: 2.5rem 0 0.8rem;
      font-weight: 700;
    }
    .article-body blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1.2rem;
      margin: 1.5rem 0;
      color: var(--ink-muted);
      font-style: italic;
    }

    /* ============================================================
       PERSONAL TAB
       ============================================================ */
    .personal-top {
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: 3rem;
      align-items: start;
      margin-bottom: 3.5rem;
    }

    @media (max-width: 600px) {
      .personal-top { grid-template-columns: 1fr; }
      .personal-photo-col { order: -1; }
    }

    .personal-bio p {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--ink);
      margin-bottom: 1.2rem;
    }

    .personal-photo-col {
      position: relative;
    }

    .personal-photo-col img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      filter: sepia(8%) contrast(1.05);
      display: block;
    }

    .personal-photo-col::after {
      content: '';
      position: absolute;
      inset: 8px -8px -8px 8px;
      border: 1px solid var(--border);
      z-index: -1;
    }

    .photo-section-label {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      font-style: italic;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }

    .photo-subtitle {
      font-size: 0.9rem;
      color: var(--ink-muted);
      margin-bottom: 2rem;
    }

    /* Masonry-style photo grid */
    .photo-grid {
      columns: 3 220px;
      gap: 0.75rem;
    }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 0.75rem;
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }

    .photo-item img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease, filter 0.3s;
      filter: sepia(5%) contrast(1.05) saturate(0.95);
    }

    .photo-item:hover img {
      transform: scale(1.03);
      filter: sepia(0%) contrast(1.08) saturate(1);
    }

    .photo-caption {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      color: var(--ink-faint);
      padding: 0.4rem 0 0.1rem;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 21, 16, 0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.open {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }

    .lightbox-caption {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: rgba(245,240,232,0.6);
      letter-spacing: 0.06em;
      text-align: center;
    }

    /* ============================================================
       FOOTER
       ============================================================ */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .footer-note {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
    }

    /* ============================================================
       ANIMATIONS
       ============================================================ */
    .tab-panel.active > * {
      animation: slideUp 0.3s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

    {
      id: "tokenization-tax",
      date: "2025-03-12",
      type: "essay",
      title: "The Tokenization Tax: Why Non-English LLM Users Pay More",
      summary: "A closer look at how subword tokenization creates a hidden computational and financial cost for speakers of non-Latin-script languages.",
      tags: ["tokenization", "equity", "LLMs"],
      content: `
        <p>When you prompt an LLM in English, a sentence like <em>"The quick brown fox"</em> typically costs 5 tokens. The same semantic content in many African or Southeast Asian languages can cost 3–5× more. This isn't a bug — it's a consequence of how subword tokenizers are trained.</p>
        <h2>Why this happens</h2>
        <p>Most popular LLMs use a byte-pair encoding (BPE) tokenizer trained predominantly on English and a handful of European languages. The vocabulary it learns reflects that distribution: common English morphemes get their own token, while entire words in Yoruba or Thai might be encoded character-by-character.</p>
        <blockquote>The practical consequence: if you're using a commercial API, you're paying 3–5× more per query in your language. If you're computing perplexity, your numbers aren't comparable across languages.</blockquote>
        <h2>What can we do about it?</h2>
        <p>Several directions are being explored: language-balanced training corpora for tokenizers, adaptive vocabularies that expand for non-English languages, and fertility-aware evaluation metrics that account for tokenization disparities. My own work explores the third direction — but the problem is ultimately upstream: we need better tokenizers, trained on more balanced data.</p>
        <p>The good news is that awareness is growing. The bad news is that most labs optimize tokenizers for English-centric benchmarks, so the incentive to fix this is weak. Until that changes, this "tokenization tax" remains a quiet form of linguistic discrimination baked into the infrastructure of AI.</p>

      content: `
        <p>Zhuang is a Tai–Kadai language spoken by roughly 18 million people in southern China — more speakers than Dutch, yet nearly invisible in NLP research. Working with it taught me something I should have already known: our field's assumptions are provincial.</p>
        <h2>The writing system surprise</h2>
        <p>Zhuang has two orthographies in active use: a Latin-based script introduced in the 1950s, and a traditional script based on Chinese characters (方块壮字, Sawndip). Most existing Zhuang data online uses neither — it uses Chinese, because that's what Zhuang speakers are educated in.</p>
        <p>This creates a fascinating problem for NLP: the "language" as it exists in digital form is actually code-switched text, not monolingual Zhuang. Any model trained on it inherits that structure.</p>
        <blockquote>The data doesn't reflect the language. It reflects the language as filtered through sociolinguistic power structures.</blockquote>
        <p>I keep this in mind whenever I see a paper claiming to "cover" a language based on web-crawled data. Coverage on paper; something messier in practice.</p>
      `,

    {

      date: "2024-11-05",
      type: "explainer",
      title: "What Is Cross-Lingual Transfer, Actually?",
      summary: "An accessible explainer on one of the core ideas in multilingual NLP — written for a curious friend who keeps asking.",
      tags: ["explainer", "multilingual NLP", "fundamentals"],
      content: `
        <p>A friend of mine — not an NLP person — keeps asking me what my research is actually about. I've given the elevator pitch so many times that I figured I should write it down properly.</p>
        <h2>The core intuition</h2>
        <p>Suppose you train a model to answer questions in English. Now you point it at a question in Swahili — a language it has never seen labeled data for. Surprisingly, with the right architecture and training, it can still do a reasonable job. That's cross-lingual transfer: knowledge learned in one language generalizing to another.</p>
        <p>Why does it work? Because multilingual models learn representations that are, to some degree, language-agnostic. The concept of <em>negation</em>, or <em>named entities</em>, or <em>subject-verb agreement</em> has structural similarities across languages. A model that truly understands these concepts in English has learned something that partially applies elsewhere.</p>
        <h2>Why it's hard</h2>
        <p>The degree of transfer drops sharply for languages that are typologically distant from the training languages, use different scripts, or are severely underrepresented in pretraining data. A model trained on European languages transfers well to other European languages and poorly to, say, Amharic or Tibetan. The gap is large, and closing it is most of what I work on.</p>
      `,
    },
  ],

<script>
// ============================================================
// RENDER ENGINE — no need to edit below this line
// ============================================================

document.addEventListener('DOMContentLoaded', () => {
  const C = CONFIG;

  // ── Helpers ─────────────────────────────────────────────────
  function el(id) { return document.getElementById(id); }
  function fmt(dateStr) {
    const d = new Date(dateStr);
    return { day: d.getDate(), month: d.toLocaleString('en', { month: 'short' }), full: d.toLocaleDateString('en', { year: 'numeric', month: 'long', day: 'numeric' }) };
  }

  // ── Header ──────────────────────────────────────────────────
  document.title = C.name + " — PhD Researcher";
  el('site-name').textContent = C.name;
  el('site-role').innerHTML = C.role.replace('·', '<span>·</span>');

  const linkDefs = [
    { key: 'scholar', label: 'Scholar', icon: '<svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>' },
    { key: 'github',  label: 'GitHub',  icon: '<svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>' },
    { key: 'twitter', label: 'Twitter', icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>' },
    { key: 'linkedin',label: 'LinkedIn',icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>' },
    { key: 'cv',      label: 'CV / Résumé', icon: '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>' },
  ];
  const linksHTML = linkDefs
    .filter(l => C.links[l.key])
    .map(l => `<a href="${C.links[l.key]}" target="_blank" rel="noopener">${l.icon}${l.label}</a>`)
    .join('');
  el('header-links').innerHTML = linksHTML;

  // ── Home ────────────────────────────────────────────────────
  el('profile-photo').src = C.profilePhoto;
  el('intro-text').innerHTML = C.intro.map((p, i) => `<p>${p}</p>`).join('');
  el('research-tags').innerHTML = C.researchTags.map(t => `<span class="tag">${t}</span>`).join('');
  el('news-list').innerHTML = C.news.map(n =>
    `<li class="news-item"><span class="news-date">${n.date}</span><span class="news-text">${n.text}</span></li>`
  ).join('');

  // ── Publications ────────────────────────────────────────────
  function renderPubs(filter) {
    const pubs = filter === 'all' ? C.publications : C.publications.filter(p => p.type === filter);
    const years = [...new Set(pubs.map(p => p.year))].sort((a, b) => b - a);

    el('pub-list').innerHTML = years.map(y => {
      const yPubs = pubs.filter(p => p.year === y);
      return `
        <div class="pub-year-group" data-year="${y}">
          <div class="pub-year">${y}</div>
          ${yPubs.map((pub, i) => {
            const authors = pub.authors.map(a =>
              a === C.name ? `<span class="you">${a}</span>` : a
            ).join(', ');
            const links = Object.entries(pub.links)
              .filter(([k, v]) => v)
              .map(([k, v]) => `<a href="${v}" class="pub-btn" target="_blank">${k}</a>`)
              .join('');
            return `
              <div class="pub-card" data-type="${pub.type}">
                <div class="pub-title">${pub.title}</div>
                <div class="pub-authors">${authors}</div>
                <div class="pub-venue">${pub.venue}</div>
                <div class="pub-abstract">${pub.abstract}</div>
                <div class="pub-actions">
                  ${links}
                  ${pub.abstract ? `<button class="pub-btn abstract-toggle">abstract ↓</button>` : ''}
                </div>
              </div>`;
          }).join('')}
        </div>`;
    }).join('') || '<p style="color:var(--ink-muted); font-style:italic;">No publications of this type yet.</p>';

    // Abstract toggles
    el('pub-list').querySelectorAll('.abstract-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const card = btn.closest('.pub-card');
        card.classList.toggle('expanded');
        btn.textContent = card.classList.contains('expanded') ? 'abstract ↑' : 'abstract ↓';
      });
    });
  }

  renderPubs('all');

  el('pub-filter').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    el('pub-filter').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPubs(btn.dataset.filter);
  });

  // ── Blog ────────────────────────────────────────────────────
  el('blog-list').innerHTML = C.posts.map(post => {
    const d = fmt(post.date);
    return `
      <div class="blog-card" data-id="${post.id}">
        <div class="blog-date-col">
          <div class="blog-date-day">${d.day}</div>
          <div class="blog-date-month">${d.month}</div>
        </div>
        <div>
          <div class="blog-type">${post.type}</div>
          <div class="blog-title">${post.title}</div>
          <div class="blog-summary">${post.summary}</div>
          <div class="blog-tags">${post.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>`;
  }).join('');

  el('blog-list').addEventListener('click', e => {
    const card = e.target.closest('.blog-card');
    if (!card) return;
    const post = C.posts.find(p => p.id === card.dataset.id);
    if (!post) return;
    const d = fmt(post.date);
    el('article-type').textContent = post.type;
    el('article-title').textContent = post.title;
    el('article-meta').textContent = d.full + '  ·  ' + post.tags.join(', ');
    el('article-body').innerHTML = post.content;
    el('blog-list-view').classList.add('hidden');
    el('article-view').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  el('back-btn').addEventListener('click', () => {
    el('article-view').classList.remove('active');
    el('blog-list-view').classList.remove('hidden');
  });

  // ── Personal ────────────────────────────────────────────────
  el('personal-bio').innerHTML = C.bio.map(p => `<p>${p}</p>`).join('');
  el('personal-photo').src = C.personalPhoto;
  el('photo-subtitle').textContent = `A few images from fieldwork travels and everyday life.`;
  el('photo-grid').innerHTML = C.photos.map((p, i) =>
    `<div class="photo-item" data-idx="${i}">
      <img src="${p.src}" alt="${p.caption}" loading="lazy">
      <div class="photo-caption">${p.caption}</div>
    </div>`
  ).join('');
  el('footer-note').textContent = `© ${new Date().getFullYear()} ${C.name}`;

  // ── Lightbox ────────────────────────────────────────────────
  const lightbox = el('lightbox');
  el('photo-grid').addEventListener('click', e => {
    const item = e.target.closest('.photo-item');
    if (!item) return;
    const idx = parseInt(item.dataset.idx);
    const photo = C.photos[idx];
    el('lightbox-img').src = photo.src;
    el('lightbox-caption').textContent = photo.caption;
    lightbox.classList.add('open');
  });
  lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

  // ── Tabs ────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      el('tab-' + btn.dataset.tab).classList.add('active');

      // Reset blog view when switching away
      if (btn.dataset.tab !== 'blog') {
        el('article-view').classList.remove('active');
        el('blog-list-view').classList.remove('hidden');
      }
    });
  });

  // ── Hash-based routing ──────────────────────────────────────
  function applyHash() {
    const hash = window.location.hash.slice(1);
    const tabs = ['home','publications','blog','personal'];
    if (tabs.includes(hash)) {
      document.querySelector(`[data-tab="${hash}"]`).click();
    }
  }
  window.addEventListener('hashchange', applyHash);
  applyHash();
});
</script>
